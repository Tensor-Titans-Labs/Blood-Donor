<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — LifeLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-wrapper auth-wrapper-wide">
    <a href="index.html" class="logo auth-logo">
      <span class="logo-icon">🩸</span>
      <span>LifeLink</span>
    </a>

    <div class="auth-card auth-card-wide">
      <h1>Create account</h1>
      <p class="auth-subtitle">Sign up so we can recommend the best donors for your searches.</p>

      <form id="signup-form" class="auth-form">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="Min. 6 characters" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="city">Your City *</label>
            <input type="text" id="city" name="city" required placeholder="e.g. Mumbai">
          </div>
          <div class="form-group">
            <label for="blood-group">Blood Group Needed</label>
            <select id="blood-group" name="bloodGroup">
              <option value="">Select (optional)</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="role">I am joining as</label>
          <select id="role" name="role">
            <option value="seeker">Looking for donors (patient / family)</option>
            <option value="donor">Blood donor</option>
          </select>
        </div>

        <p id="signup-error" class="form-error" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      window.location.href = 'index.html';
    }

    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('signup-error');
      errorEl.hidden = true;

      const form = e.target;
      const result = Auth.register({
        name: form.name.value,
        email: form.email.value,
        password: form.password.value,
        city: form.city.value,
        bloodGroup: form['blood-group'].value,
        phone: form.phone.value,
        role: form.role.value,
      });

      if (!result.ok) {
        errorEl.textContent = result.error;
        errorEl.hidden = false;
        return;
      }

      window.location.href = Auth.getHomeUrl(result.user.role);
    });
  </script>
</body>
</html>
